name: payngo2
description: "PayNGo - Smart Self-Checkout Graduation Project @ CIC"
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Experience (الواجهة) ---
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  flutter_svg: ^2.0.10
  video_player: ^2.8.1
  flutter_spinkit: ^5.2.1 # 🔴 إضافة لمؤشرات تحميل "شيك" جداً
  app_links: ^6.3.2  # ضيف السطر ده
  # --- State Management (إدارة البيانات) ---
  provider: ^6.1.1

  # --- Core Functions (المسح والباركود) ---
  mobile_scanner: ^5.2.0
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  intl: ^0.19.0 # 🔴 ضرورية لتنسيق العملة (EGP) والوقت

  # --- Firebase & Authentication (الداتابيز) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# 🔴 تظبيط أيقونة الأبلكيشن (لاحظ تعديل امتداد الملف)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_2.JPG" # يفضل يكون الاسم بدون مسافات
  adaptive_icon_background: "#121212" # خليناه أسود عشان يتماشى مع براند PayNGo
  adaptive_icon_foreground: "assets/images/logo_2.JPG"

flutter:
  uses-material-design: true

  # تعريف الفولدرات الأساسية
  assets:
    - assets/images/
    - assets/videos/ # 🔴 يفضل تفصل الفيديوهات لوحدها عشان التنظيم